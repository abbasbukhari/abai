<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Navy background for contrast at small sizes -->
  <rect width="64" height="64" fill="#0F1629" rx="12"/>

  <!-- Hexagon outer border (network boundary) -->
  <path d="M32 8 L48 16 L48 40 L32 48 L16 40 L16 16 Z"
    fill="none" stroke="#2563EB" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Inner "A" glyph - simple, bold, recognizable -->
  <g fill="none" stroke="#2563EB" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left diagonal of A -->
    <path d="M24 42 L32 22"/>
    <!-- Right diagonal of A -->
    <path d="M40 42 L32 22"/>
    <!-- Horizontal bar of A -->
    <path d="M26 35 L38 35"/>
  </g>

  <!-- Accent dot at apex (the dot from your original design) -->
  <circle cx="32" cy="18" r="2" fill="#F59E0B"/>
</svg>
